name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any preceding run on the pull request.
concurrency:
  group: bazel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Mount Bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          # Shared with the ubuntu-24.04 build-and-test shard.
          key: bazel-ubuntu-24.04-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-ubuntu-24.04-

      - name: Install tools
        run: sudo apt install -y clang-format clang-tidy-18

      # format.sh modifies files in-place; the diff check below catches any
      # changes, so we use a single "run and diff" pattern for both clang-format
      # and buildifier rather than separate --dry-run/--check invocations.
      - run: ./format.sh
      - name: Check formatting diff
        run: |
          if changed=$(git diff-index --name-only HEAD --) && [[ -n "$changed" ]]; then
            echo -e "Please run format.sh. Files needing formatting:\n$changed"
            exit 1
          fi

      # TODO(buf-edition-2024): Re-enable buf lint/breaking once buf supports
      # edition 2024. Tracked in https://github.com/smolkaj/4ward/pull/4.

      # On PRs, skip clang-tidy when no C++ files were modified — most PRs
      # only touch Kotlin or proto files.  Always run on pushes to main.
      - name: Detect C++ changes
        id: cpp
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh pr diff "${{ github.event.pull_request.number }}" --name-only)
          if ! printf '%s\n' "$FILES" | grep -qE '\.(cpp|cc|h)$|\.clang-tidy$'; then
            echo "No C++ files changed; skipping clang-tidy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate compile_commands.json
        if: steps.cpp.outputs.skip != 'true'
        run: bazel run //:refresh_compile_commands

      - name: Run clang-tidy
        if: steps.cpp.outputs.skip != 'true'
        run: |
          find p4c_backend \( -name "*.cpp" -o -name "*.cc" \) -print0 \
            | xargs -0 -P "$(nproc)" -I{} \
                clang-tidy-18 -p . {}


  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]

    steps:
      - uses: actions/checkout@v6

      - name: Mount Bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-${{ matrix.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-${{ matrix.os }}-

      - name: Build
        run: bazel build //...

      - name: Test
        run: bazel test //... --test_output=errors


  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    env:
      PR_NUM: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6

      - name: Mount Bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-coverage-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-coverage-

      - name: Install lcov
        run: sudo apt install -y lcov

      - name: Run coverage
        run: ./coverage.sh --html

      - name: Publish HTML report to GitHub Pages
        run: |
          git fetch --depth=1 origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          mkdir -p "/tmp/gh-pages/pr/${PR_NUM}"
          cp -r coverage-report/* "/tmp/gh-pages/pr/${PR_NUM}/"
          cd /tmp/gh-pages
          git add "pr/${PR_NUM}"
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "Coverage report for PR #${PR_NUM}" --allow-empty
          # Retry once on conflict (concurrent PR pushes).
          git push origin gh-pages || (git pull --rebase origin gh-pages && git push origin gh-pages)

      - name: Comment coverage on PR
        run: |
          MARKER="<!-- coverage-report -->"
          TOTAL_LH=$(awk -F: '/^LH:/{s+=$2} END{print s+0}' coverage.lcov)
          TOTAL_LF=$(awk -F: '/^LF:/{s+=$2} END{print s+0}' coverage.lcov)
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "${TOTAL_LF}" -gt 0 ]]; then
            PCT=$(( 100 * TOTAL_LH / TOTAL_LF ))
            REPORT_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/pr/${PR_NUM}/"
            BODY="${MARKER}"$'\n'"**Coverage**: ${TOTAL_LH}/${TOTAL_LF} lines (${PCT}%) — [full report](${REPORT_URL})"
          else
            BODY="${MARKER}"$'\n'"**Coverage**: no data collected"
          fi
          # Update existing comment or create a new one.
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)
          if [[ -n "${EXISTING}" ]]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
              -X PATCH -f body="${BODY}"
          else
            gh pr comment "${PR_NUM}" --body "${BODY}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
