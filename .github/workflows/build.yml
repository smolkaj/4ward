name: Build and Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Setup Bazel
      uses: bazelbuild/setup-bazel@v3.0.0
    - name: Build
      run: bazel build //...
    - name: Test
      run: bazel test //...
