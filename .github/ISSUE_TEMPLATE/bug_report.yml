name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: >
        Ideally, provide a minimal P4 program and STF test (or CLI/gRPC
        commands) that trigger the issue.
      placeholder: |
        1. Compile `example.p4` with `4ward compile example.p4`
        2. Run `4ward sim ...`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: >
        Output of `4ward --version`, or the commit SHA you're building from.
    validations:
      required: false
  - type: dropdown
    id: architecture
    attributes:
      label: P4 architecture
      options:
        - v1model
        - PNA
        - Other / N/A
    validations:
      required: false
