# detekt configuration for 4ward.
# Run with --build-upon-default-config so unmentioned rules use detekt defaults.
# Follows the Google Kotlin style guide: https://google.github.io/styleguide/kotlinguide.html

naming:
  # The Google Kotlin style guide explicitly permits backtick-named test functions
  # (e.g. `fun `addition wraps at width boundary`()`). Extend the default test
  # directory exclusions to cover our colocated *Test.kt files.
  FunctionNaming:
    excludes: ['**/test/**', '**/*Test.kt']

  # Bazel source layout: simulator/*.kt carries package fourward.simulator but
  # lives under simulator/, not fourward/simulator/. The mismatch is intentional.
  InvalidPackageDeclaration:
    active: false

  # Main.kt has main() + supporting declarations (OutputFormat, UsageError);
  # forcing the file to match a single declaration name is counterproductive.
  MatchingDeclarationName:
    active: false

style:
  MaxLineLength:
    maxLineLength: 100  # Google Kotlin style guide §4.4

  # TODOs are tracked in the issue tracker and are not a style violation.
  ForbiddenComment:
    active: false

  # Google style guide sets no limit on return statements per function.
  ReturnCount:
    active: false

  # Multiple continues in a loop is the natural pattern for multi-condition
  # filtering (e.g. skip if no type name, skip if not in map). Splitting
  # into helper predicates adds indirection without improving clarity.
  LoopWithTooManyJumpStatements:
    active: false

  # Validation functions naturally have multiple throw-on-error paths
  # (one per validation check). Suppressing this is less readable than
  # letting each check throw directly.
  ThrowsCount:
    active: false

  # Numeric literals in tests are self-documenting (e.g. BitVector.ofInt(0xFF, 8)).
  # Extend the default excludes to cover our colocated *Test.kt files.
  # Also add the small integers that frequently appear as byte/hex constants (8, 16)
  # or sentinel values (100) — extracting them as named constants adds ceremony
  # without clarifying intent (HEX_RADIX = 16 does not explain more than 16 alone).
  MagicNumber:
    excludes: ['**/test/**', '**/*.kts', '**/*Test.kt']
    ignoreNumbers: ['-1', '0', '1', '2', '3', '4', '7', '8', '16', '32', '100', '0xFF', '0xFFFFFFFFL']

complexity:
  # Test builder helpers legitimately need many parameters to fully specify a test
  # case without introducing opaque intermediate objects.
  # writeIndexedExtern() has 7 params (generic validation: type, name, id, index, info, storage, value).
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 9
    excludes: ['**/test/**', '**/*Test.kt']

  # The default (150 lines) is unreasonable for tree-walking interpreters whose
  # size scales linearly with the number of language constructs, or test classes
  # that grow proportionally with the feature set. The more targeted
  # TooManyFunctions and CyclomaticComplexMethod checks catch actual complexity.
  LargeClass:
    threshold: 2000

  # 11 is far too low for operator-rich value classes like BitVector (21 functions)
  # or dispatch classes like Interpreter (one function per AST node kind).
  # Google style sets no hard limit.
  TooManyFunctions:
    thresholdInFiles: 60
    thresholdInClasses: 45
    thresholdInInterfaces: 30
    thresholdInObjects: 30
    thresholdInEnums: 11
    excludes: ['**/test/**', '**/*Test.kt']

  # The default (4) is too low for work-stack interpreters like buildTraceTree,
  # where an explicit stack loop naturally nests: while → when → branch → try/catch.
  NestedBlockDepth:
    threshold: 6

  # Protocol dispatch functions (Interpreter.evalExpr, evalBinaryOp) are large
  # `when` expressions whose cyclomatic complexity grows linearly with the number
  # of P4 language constructs — not a readability problem.
  CyclomaticComplexMethod:
    threshold: 30

  # 60 lines is too tight for sequential protocol handlers (e.g. StfRunner.run, which
  # encodes a strict request/response sequence that reads clearly as one function).
  # CyclomaticComplexMethod already catches functions that are genuinely hard to follow.
  LongMethod:
    active: false

exceptions:
  # ExitException and PacketTooShortException are P4 control-flow mechanisms (exit
  # unwinds the current stage; PacketTooShort signals a parser error that drops the
  # packet in v1model). EOFException signals normal controller shutdown.
  # Suppressing these globally avoids per-site noise.
  SwallowedException:
    ignoredExceptionTypes:
      - InterruptedException
      - NumberFormatException
      - ParseException
      - ExitException
      - EOFException
      - PacketTooShortException
      - FileNotFoundException
      - NoSuchFileException

  # The simulator subprocess writes diagnostics to stderr; e.printStackTrace(System.err)
  # is the right call there. Alternatives (logging frameworks, custom formatters) would
  # add dependencies without benefit in a short-lived subprocess.
  PrintStackTrace:
    active: false
