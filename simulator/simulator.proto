// 4ward Simulator Service
//
// Request/response protocol between a controller (P4Runtime server, STF runner,
// or any other client) and the simulator subprocess.
//
// Transport: length-delimited protocol buffers over stdin/stdout — a 4-byte
// big-endian length prefix followed by the serialised SimRequest or
// SimResponse. This is the same framing used by Bazel's persistent worker
// protocol.
//
// Concurrency: the simulator processes one request at a time. Clients that need
// concurrent access must serialise requests (e.g. with a mutex).

edition = "2024";

package fourward.sim.v1;

import "ir.proto";
import "p4/v1/p4runtime.proto";

option java_package = "fourward.sim.v1";

// =============================================================================
// Envelope
// =============================================================================

message SimRequest {
  oneof request {
    LoadPipelineRequest load_pipeline = 1;
    ProcessPacketRequest process_packet = 2;
    WriteEntryRequest write_entry = 3;
    ReadEntriesRequest read_entries = 4;
  }
}

message SimResponse {
  oneof response {
    LoadPipelineResponse load_pipeline = 1;
    ProcessPacketResponse process_packet = 2;
    WriteEntryResponse write_entry = 3;
    ReadEntriesResponse read_entries = 4;
    ErrorResponse error = 100;
  }
}

// =============================================================================
// Pipeline management
// =============================================================================

// Installs a compiled P4 program. Must be sent before any ProcessPacketRequest.
// Sending a new LoadPipelineRequest replaces the current program and clears all
// table entries.
message LoadPipelineRequest {
  fourward.ir.v1.PipelineConfig config = 1;
}
message LoadPipelineResponse {}

// =============================================================================
// Packet processing
// =============================================================================

message ProcessPacketRequest {
  uint32 ingress_port = 1;
  bytes payload = 2;
}

// The primary output of the simulator: output packets (what a real device would
// emit) plus a complete execution trace tree (what 4ward uniquely provides).
//
// At non-deterministic choice points (action selectors, clone, multicast) the
// tree forks into branches — one per possible outcome.  A program with no
// non-determinism produces a zero-fork tree that is structurally equivalent to
// a flat trace.
message ProcessPacketResponse {
  repeated OutputPacket output_packets = 1;
  TraceTree trace = 2;
}

message OutputPacket {
  uint32 egress_port = 1;
  bytes payload = 2;
}

// =============================================================================
// Execution trace tree
//
// A complete record of every decision the simulator made while processing a
// packet.  Events within a node are ordered chronologically.  At
// non-deterministic choice points the tree forks: each branch represents one
// possible outcome and contains its own subtree of events.
//
// Every node terminates: either forking (fork_outcome) or reaching a final
// packet fate (packet_outcome).  A zero-fork tree has a single
// packet_outcome at the root.
// =============================================================================

// Recursive trace structure: a sequence of events followed by an outcome.
// Shared prefix events (e.g. the parser trace before a selector fork) live in
// the parent node; per-branch events live in the fork's subtrees.
message TraceTree {
  repeated TraceEvent events = 1;
  oneof outcome {
    Fork fork_outcome = 2;
    PacketOutcome packet_outcome = 3;
  }
}

// A non-deterministic choice point where execution forks into multiple
// possible paths.
message Fork {
  ForkReason reason = 1;
  repeated ForkBranch branches = 2;
}

// One branch of a fork.  The label describes this particular outcome (e.g. the
// action selector member name or "clone"/"original").
message ForkBranch {
  string label = 1;
  TraceTree subtree = 2;
}

enum ForkReason {
  FORK_REASON_UNSPECIFIED = 0;
  ACTION_SELECTOR = 1;
  CLONE = 2;
  MULTICAST = 3;
}

// The terminal fate of a packet: either output on a port or dropped.
message PacketOutcome {
  oneof outcome {
    OutputPacket output = 1;
    Drop drop = 2;
  }
}

// A packet that was dropped (as opposed to MarkToDropEvent, which records the
// mark_to_drop() call site in the trace).
message Drop {
  DropReason reason = 1;
}

message TraceEvent {
  oneof event {
    ParserTransitionEvent parser_transition = 1;
    TableLookupEvent table_lookup = 2;
    ActionExecutionEvent action_execution = 3;
    BranchEvent branch = 4;
    ExternCallEvent extern_call = 5;
    MarkToDropEvent mark_to_drop = 6;
    CloneEvent clone = 7;
  }

  fourward.ir.v1.SourceInfo source_info = 100;
}

// Fired on every parser state transition, including the final transition to
// "accept" or "reject".
message ParserTransitionEvent {
  string parser_name = 1;
  string from_state = 2;
  string to_state = 3;
}

// Fired on every table.apply(). Records hit/miss, matched entry, and selected
// action.
message TableLookupEvent {
  string table_name = 1;
  bool hit = 2;
  p4.v1.TableEntry matched_entry = 3;  // present on hit; absent on miss
  string action_name = 4;              // default action on miss
}

// Fired when an action begins executing. Parameter values are big-endian bytes.
message ActionExecutionEvent {
  string action_name = 1;
  map<string, bytes> params = 2;
}

// Fired on every if/else branch.
message BranchEvent {
  string control_name = 1;
  bool taken = 2;  // true = then-branch; false = else-branch
}

// Fired on every extern method call.
message ExternCallEvent {
  string extern_instance_name = 1;
  string method = 2;
}

// Fired when mark_to_drop() is called. Records the call site, not the packet
// fate — the actual drop is represented by Drop in PacketOutcome.
message MarkToDropEvent {
  DropReason reason = 1;
}

// Fired when the P4 program requests a packet clone.
message CloneEvent {
  uint32 session_id = 1;
}

enum DropReason {
  DROP_REASON_UNSPECIFIED = 0;
  MARK_TO_DROP = 1;   // explicit mark_to_drop()
  PARSER_REJECT = 2;  // parser transitioned to reject state
}

// =============================================================================
// Table entry management
// =============================================================================

// Reuses P4Runtime's Update message so clients can share entry-building code.
message WriteEntryRequest {
  p4.v1.Update update = 1;
}
message WriteEntryResponse {}

message ReadEntriesRequest {
  p4.v1.ReadRequest request = 1;
}
message ReadEntriesResponse {
  repeated p4.v1.Entity entities = 1;
}

// =============================================================================
// Errors
// =============================================================================

message ErrorResponse {
  string message = 1;
  ErrorCode code = 2;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  INVALID_REQUEST = 1;
  NO_PIPELINE_LOADED = 2;
  INTERNAL_ERROR = 3;
}
