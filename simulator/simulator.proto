// 4ward Simulator
//
// Shared types used by the simulator library and its clients (P4Runtime
// server, STF runner, trace tree tests, BMv2 differential tests).
//
// The Dataplane gRPC service is defined separately in
// p4runtime/dataplane.proto.

syntax = "proto3";

package fourward.sim;

import "ir.proto";
import "p4/v1/p4runtime.proto";

option java_package = "fourward.sim";
option java_outer_classname = "SimulatorProto";

// =============================================================================
// Packet types (shared between trace trees and the Dataplane service)
// =============================================================================

message InputPacket {
  uint32 ingress_port = 1;
  bytes payload = 2;
}

message OutputPacket {
  uint32 dataplane_egress_port = 1;
  // P4Runtime port ID. Populated by enrichment layers (e.g. DataplaneService),
  // never by the simulator.
  bytes p4rt_egress_port = 3;
  bytes payload = 2;
}

// =============================================================================
// Execution trace tree
//
// A complete record of every decision the simulator made while processing a
// packet.  Events within a node are ordered chronologically.  At
// non-deterministic choice points the tree forks: each branch represents one
// possible outcome and contains its own subtree of events.
//
// Every node terminates: either forking (fork_outcome) or reaching a final
// packet fate (packet_outcome).  A zero-fork tree has a single
// packet_outcome at the root.
// =============================================================================

// Recursive trace structure: a sequence of events followed by an outcome.
// Shared prefix events (e.g. the parser trace before a selector fork) live in
// the parent node; per-branch events live in the fork's subtrees.
message TraceTree {
  repeated TraceEvent events = 1;
  oneof outcome {
    Fork fork_outcome = 2;
    PacketOutcome packet_outcome = 3;
  }
}

// A non-deterministic choice point where execution forks into multiple
// possible paths.
//
// Forks come in two flavors (see ForkMode):
//
//  • **Parallel** (clone, multicast, resubmit, recirculate) — all branches
//    execute simultaneously in a single real execution.  The packet outputs
//    are the union of all branch outputs.
//
//  • **Alternative** (action selector) — exactly one branch executes at
//    runtime (determined by a hash function).  Each branch represents one
//    *possible world*; the trace tree explores all of them.
//
// This distinction matters when collecting output packets from the tree:
// parallel branches are combined (union), while alternative branches are
// kept separate (each is a distinct possible outcome set).
message Fork {
  ForkReason reason = 1;
  repeated ForkBranch branches = 2;
}

// One branch of a fork.  The label describes this particular outcome (e.g. the
// action selector member name or "clone"/"original").
message ForkBranch {
  string label = 1;
  TraceTree subtree = 2;
}

// Whether a fork's branches all happen or only one happens is determined by
// the ForkReason.  See ForkMode in the simulator Kotlin code.
enum ForkReason {
  FORK_REASON_UNSPECIFIED = 0;
  ACTION_SELECTOR = 1;  // Alternative: one member is selected by hash.
  CLONE = 2;            // Parallel: original + clone(s) all execute.
  MULTICAST = 3;        // Parallel: one replica per multicast group member.
  RESUBMIT = 4;         // Parallel: packet re-enters the pipeline.
  RECIRCULATE = 5;      // Parallel: deparsed packet loops back.
}

// The terminal fate of a packet: either output on a port or dropped.
message PacketOutcome {
  oneof outcome {
    OutputPacket output = 1;
    Drop drop = 2;
  }
}

// A packet that was dropped (as opposed to MarkToDropEvent, which records the
// mark_to_drop() call site in the trace).
message Drop {
  DropReason reason = 1;
}

message TraceEvent {
  oneof event {
    ParserTransitionEvent parser_transition = 1;
    TableLookupEvent table_lookup = 2;
    ActionExecutionEvent action_execution = 3;
    BranchEvent branch = 4;
    ExternCallEvent extern_call = 5;
    MarkToDropEvent mark_to_drop = 6;
    CloneEvent clone = 7;
    PacketIngressEvent packet_ingress = 8;
    PipelineStageEvent pipeline_stage = 9;
    CloneSessionLookupEvent clone_session_lookup = 10;
    LogMessageEvent log_message = 11;
    AssertionEvent assertion = 12;
    DeparserEmitEvent deparser_emit = 13;
  }

  fourward.ir.SourceInfo source_info = 100;
}

// Fired on every parser state transition, including the final transition to
// "accept" or "reject".
message ParserTransitionEvent {
  string parser_name = 1;
  string from_state = 2;
  string to_state = 3;
  // For select transitions: the evaluated key values (e.g. "0x0800").
  // Empty for direct transitions.
  string select_value = 4;
  // For select transitions: the human-readable key expression
  // (e.g. "hdr.ethernet.etherType"). Empty for direct transitions.
  string select_expression = 5;
}

// Fired on every table.apply(). Records hit/miss, matched entry, and selected
// action.
message TableLookupEvent {
  string table_name = 1;
  // Explicit presence so `hit: false` (miss) is visible in text proto.
  optional bool hit = 2;
  // Matched table entry in dataplane representation. Present on hit; absent on
  // miss.
  p4.v1.TableEntry matched_entry = 3;
  // matched_entry with values translated to P4Runtime representation.
  // Populated by enrichment layers, never by the simulator.
  p4.v1.TableEntry p4rt_matched_entry = 5;
  string action_name = 4;  // default action on miss
}

// Fired when an action begins executing. Parameter values are big-endian bytes.
message ActionExecutionEvent {
  string action_name = 1;
  map<string, bytes> params = 2;
}

// Fired on every if/else branch.
message BranchEvent {
  string control_name = 1;
  // Explicit presence so `taken: false` is visible in text proto output
  // (plain `bool` would be suppressed as a proto3 default value).
  optional bool taken = 2;  // true = then-branch; false = else-branch
}

// Fired on every extern method call.
message ExternCallEvent {
  string extern_instance_name = 1;
  string method = 2;
}

// Fired when mark_to_drop() is called. Records the call site, not the packet
// fate — the actual drop is represented by Drop in PacketOutcome.
message MarkToDropEvent {
  DropReason reason = 1;
}

// Fired when the P4 program calls clone().
message CloneEvent {
  uint32 session_id = 1;
}

// Fired at the ingress→egress (or post-egress) boundary when the traffic
// manager resolves a pending clone session.
message CloneSessionLookupEvent {
  uint32 session_id = 1;
  optional bool session_found =
      2;  // false = session not configured, clone silently dropped
  uint32 dataplane_egress_port =
      3;  // clone destination; only meaningful when session_found
  // P4Runtime port ID. Populated by enrichment layers, never by the simulator.
  bytes p4rt_egress_port = 4;
}

// Fired when a packet arrives at the pipeline — the very first event in any
// trace.
message PacketIngressEvent {
  uint32 dataplane_ingress_port = 1;
  // P4Runtime port ID. Populated by enrichment layers, never by the simulator.
  bytes p4rt_ingress_port = 2;
}

// Fired when the pipeline enters or exits a processing stage (parser, control,
// deparser).
message PipelineStageEvent {
  string stage_name = 1;
  fourward.ir.StageKind stage_kind = 2;
  enum Direction {
    DIRECTION_UNSPECIFIED = 0;
    ENTER = 1;
    EXIT = 2;
  }
  Direction direction = 3;
}

// Fired when the P4 program calls log_msg().
message LogMessageEvent {
  string message = 1;
}

// Fired when the P4 program calls assert() or assume(). P4 spec §12.9.
message AssertionEvent {
  bool passed = 1;  // true = condition held; false = assertion failed
}

// Fired when the deparser emits a header to the output packet buffer.
message DeparserEmitEvent {
  string header_type = 1;  // TypeDecl name (e.g. "ethernet_t")
  uint32 byte_length = 2;  // number of bytes emitted for this header
}

enum DropReason {
  DROP_REASON_UNSPECIFIED = 0;
  MARK_TO_DROP = 1;   // explicit mark_to_drop()
  PARSER_REJECT = 2;  // parser transitioned to reject state
  PIPELINE_EXECUTION_LIMIT_REACHED =
      3;                  // too many fork branches (exponential blowup guard)
  ASSERTION_FAILURE = 4;  // assert() or assume() failed
}
