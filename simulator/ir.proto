// 4ward Behavioral IR
//
// This file is the heart of 4ward. It defines the intermediate representation
// (IR) emitted by the p4c_backend and consumed by the simulator.
//
// Design principles:
//
//   Architecture-generic: the Architecture message captures pipeline wiring and
//   extern declarations; extern semantics are implemented per-architecture in
//   the simulator. Adding a new architecture requires only a new Architecture
//   value and a corresponding simulator implementation.
//
//   Readable: all cross-references use names, not numeric IDs. Numeric IDs from
//   p4info are reserved for the control-plane API (P4Runtime) only.
//
//   Type-complete: every Expr node carries a Type annotation populated by p4c
//   after type resolution. The simulator never infers types at runtime.
//
// Relationship to p4info:
//   PipelineConfig embeds a p4.config.v1.P4Info alongside this behavioral
//   config. p4info owns the control-plane description (table IDs, action IDs,
//   etc.). This file owns the execution semantics.
//
// The IR is emitted after p4c's midend passes: generics instantiated, types
// resolved, constants folded, header stacks concretized.

edition = "2024";

package fourward.ir.v1;

import "p4/config/v1/p4info.proto";
import "p4/v1/p4runtime.proto";

option java_package = "fourward.ir.v1";

// =============================================================================
// Top-level
// =============================================================================

// PipelineConfig is the top-level message for a compiled P4 program. It maps
// directly onto the P4Runtime SetForwardingPipelineConfig RPC.
message PipelineConfig {
  p4.config.v1.P4Info p4info = 1;
  P4BehavioralConfig behavioral = 2;

  // Static table entries declared with `const entries` in the P4 source.
  // Populated by p4c's P4Runtime serializer; the simulator installs these
  // into the table store at pipeline load time.
  p4.v1.WriteRequest static_entries = 3;
}

message P4BehavioralConfig {
  Architecture architecture = 1;
  repeated TypeDecl types = 2;
  repeated ParserDecl parsers = 3;
  repeated ControlDecl controls = 4;
  repeated ActionDecl actions = 5;

  // Supplements p4info's table descriptions with key expressions to evaluate.
  // One entry per table; name matches p4info table preamble name.
  repeated TableBehavior tables = 6;
}

// =============================================================================
// Architecture
// =============================================================================

// Architecture describes the pipeline structure for a specific P4 architecture.
// The name field selects the simulator's architecture implementation (clone,
// resubmit, etc. differ between v1model and PSA). The stages field describes
// the structural wiring.
message Architecture {
  // Well-known identifier used by the simulator to select the correct
  // implementation. Current values: "v1model", "psa", "pna".
  string name = 1;

  repeated PipelineStage stages = 2;

  // Extern types provided by this architecture. The simulator's architecture
  // implementation provides runtime semantics for each.
  repeated ExternTypeDecl extern_types = 3;
}

message PipelineStage {
  string name = 1;  // e.g. "ingress", "egress_parser"
  StageKind kind = 2;
  string block_name = 3;  // references a ParserDecl or ControlDecl by name
}

enum StageKind {
  STAGE_KIND_UNSPECIFIED = 0;
  PARSER = 1;
  CONTROL = 2;
  DEPARSER = 3;
}

// ExternTypeDecl declares an extern type provided by the architecture.
// Semantics are implemented in the simulator; this declaration lets the
// simulator validate instantiations and method calls at load time.
message ExternTypeDecl {
  string name = 1;
  repeated ParamDecl constructor_params = 2;
  repeated MethodDecl methods = 3;
}

message MethodDecl {
  string name = 1;
  repeated ParamDecl params = 2;
  Type return_type = 3;
}

// =============================================================================
// Type system
// =============================================================================

// Always present on Expr nodes (annotated by p4c after type resolution).
message Type {
  oneof kind {
    BitType bit = 1;         // bit<N>: unsigned N-bit integer
    IntType signed_int = 2;  // int<N>: signed N-bit two's-complement integer
    VarbitType varbit = 3;   // varbit<N>: variable-length bitstring, max N bits
    bool boolean = 4;
    string named = 5;  // reference to a TypeDecl by name
    HeaderStackType header_stack = 6;
    bool error = 7;  // P4 error type
  }
}

message BitType {
  uint32 width = 1;
}
message IntType {
  uint32 width = 1;
}
message VarbitType {
  uint32 max_width = 1;
}

message HeaderStackType {
  string element_type = 1;  // references a TypeDecl whose kind is header
  uint32 size = 2;
}

// =============================================================================
// Declarations
// =============================================================================

// All types referenced in the program are declared here after p4c's midend;
// the program contains no anonymous types.
message TypeDecl {
  string name = 1;
  oneof kind {
    HeaderDecl header = 2;
    StructDecl struct = 3;
    HeaderUnionDecl header_union = 4;
    EnumDecl enum = 5;
  }
}

message HeaderDecl {
  repeated FieldDecl fields = 1;
}
message StructDecl {
  repeated FieldDecl fields = 1;
}
message HeaderUnionDecl {
  repeated FieldDecl fields = 1;
}
message EnumDecl {
  repeated string members = 1;
  // Underlying bit width for serializable enums (enum bit<N> E { ... }).
  // Zero for uninterpreted (non-serializable) enums.
  uint32 width = 2;
}

message FieldDecl {
  string name = 1;
  Type type = 2;
}

message ParamDecl {
  string name = 1;
  Type type = 2;
  Direction direction = 3;
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  IN = 1;
  OUT = 2;
  INOUT = 3;
}

message VarDecl {
  string name = 1;
  Type type = 2;
  Expr initializer = 3;  // absent if no initialiser
}

// =============================================================================
// Parser
// =============================================================================

message ParserDecl {
  string name = 1;
  repeated ParamDecl params = 2;
  repeated ParserState states = 3;
  repeated VarDecl local_vars = 4;
}

message ParserState {
  // Predefined: "start", "accept", "reject". All others are user-defined.
  string name = 1;
  repeated Stmt stmts = 2;
  Transition transition = 3;
}

message Transition {
  oneof kind {
    string next_state = 1;
    SelectTransition select = 2;
  }
}

message SelectTransition {
  repeated Expr keys = 1;
  repeated SelectCase cases = 2;
  string default_state = 3;
}

message SelectCase {
  repeated KeysetExpr keysets = 1;
  string next_state = 2;
}

message KeysetExpr {
  oneof kind {
    Expr exact = 1;
    RangeKeyset range = 2;  // lo .. hi (inclusive)
    MaskKeyset mask = 3;    // value &&& mask
    bool default_case = 4;  // the "_" wildcard
  }
}

message RangeKeyset {
  Expr lo = 1;
  Expr hi = 2;
}
message MaskKeyset {
  Expr value = 1;
  Expr mask = 2;
}

// =============================================================================
// Control
// =============================================================================

message ControlDecl {
  string name = 1;
  repeated ParamDecl params = 2;
  repeated VarDecl local_vars = 3;
  repeated ActionDecl local_actions = 4;
  repeated Stmt apply_body = 5;
}

message ActionDecl {
  // Semantic name: matches the p4info alias and originalName (used for table
  // dispatch).
  string name = 1;
  repeated ParamDecl params = 2;
  repeated Stmt body = 3;
  // Post-midend name if renamed (e.g. "do_thing_1" when "do_thing" was
  // duplicated). Populated only when different from name. The interpreter
  // indexes actions under both name and current_name so both table dispatch and
  // inline calls resolve.
  string current_name = 4;
}

// Supplements the p4info table description with key expressions.
// Name must match p4info table.preamble.name.
message TableBehavior {
  string name = 1;

  // In the same order as p4info match_fields. The simulator evaluates each
  // expression to produce the lookup key.
  repeated TableKey keys = 2;
}

message TableKey {
  string field_name = 1;  // matches p4info match_field.name
  Expr expr = 2;
}

// =============================================================================
// Statements
// =============================================================================

message Stmt {
  oneof kind {
    AssignmentStmt assignment = 1;
    MethodCallStmt method_call = 2;
    IfStmt if_stmt = 3;
    SwitchStmt switch_stmt = 4;  // switch (table.apply().action_run) { ... }
    BlockStmt block = 5;
    ExitStmt exit = 6;
    ReturnStmt return_stmt = 7;
  }
}

message AssignmentStmt {
  Expr lhs = 1;  // lvalue: NameRef, FieldAccess, ArrayIndex, or Slice
  Expr rhs = 2;
}

message MethodCallStmt {
  Expr call = 1;  // return value is discarded
}

message IfStmt {
  Expr condition = 1;
  BlockStmt then_block = 2;
  BlockStmt else_block = 3;  // empty if no else branch
}

// switch (table.apply().action_run) { case action_name: { ... } ... }
// subject is always a TableApplyExpr.
message SwitchStmt {
  Expr subject = 1;
  repeated SwitchCase cases = 2;
  BlockStmt default_block = 3;
}

message SwitchCase {
  string action_name = 1;
  BlockStmt block = 2;
}

message BlockStmt {
  repeated Stmt stmts = 1;
}
message ExitStmt {}
message ReturnStmt {
  Expr value = 1;
}

// =============================================================================
// Expressions
// =============================================================================

// Every Expr carries a Type annotation (field 100, always populated by p4c).
// The simulator relies on this for bit-precise arithmetic; types are never
// inferred at runtime.
message Expr {
  oneof kind {
    Literal literal = 1;
    NameRef name_ref = 2;
    FieldAccess field_access = 3;
    ArrayIndex array_index = 4;  // header_stack[index]
    Slice slice = 5;             // expr[hi:lo]
    Concat concat = 6;           // expr ++ expr
    Cast cast = 7;
    BinaryOp binary_op = 8;
    UnaryOp unary_op = 9;
    MethodCall method_call = 10;
    TableApplyExpr table_apply = 11;
    MuxExpr mux = 12;             // condition ? then_expr : else_expr
    StructExpr struct_expr = 13;  // { field1, field2, ... }
  }

  Type type = 100;  // always present
}

// condition ? then_expr : else_expr  (P4 §8.9.3)
message MuxExpr {
  Expr condition = 1;
  Expr then_expr = 2;
  Expr else_expr = 3;
}

// Struct/tuple literal expression: { field1 = expr1, field2 = expr2, ... }
// Used by externs like verify_checksum whose data argument is a list expression
// that p4c lowers to a StructExpression.
message StructExpr {
  repeated StructExprField fields = 1;
}
message StructExprField {
  string name = 1;
  Expr value = 2;
}

message Literal {
  oneof kind {
    uint64 integer = 1;     // bit<N> where N <= 64
    bytes big_integer = 2;  // big-endian bytes for bit<N> where N > 64
    bool boolean = 3;
    string error_member = 4;  // e.g. "NoError", "PacketTooShort"
    string enum_member =
        5;  // plain (non-serializable) enum member, e.g. "crc16"
  }
}

message NameRef {
  string name = 1;
}
message FieldAccess {
  Expr expr = 1;
  string field_name = 2;
}
message ArrayIndex {
  Expr expr = 1;
  Expr index = 2;
}
message Slice {
  Expr expr = 1;
  uint32 hi = 2;
  uint32 lo = 3;
}
message Concat {
  Expr left = 1;
  Expr right = 2;
}
message Cast {
  Type target_type = 1;
  Expr expr = 2;
}

message BinaryOp {
  BinaryOperator op = 1;
  Expr left = 2;
  Expr right = 3;
}

enum BinaryOperator {
  BINARY_OPERATOR_UNSPECIFIED = 0;
  ADD = 1;
  SUB = 2;
  MUL = 3;
  DIV = 4;
  MOD = 5;
  ADD_SAT = 6;  // |+|
  SUB_SAT = 7;  // |-|
  BIT_AND = 8;
  BIT_OR = 9;
  BIT_XOR = 10;
  SHL = 11;
  SHR = 12;
  EQ = 13;
  NEQ = 14;
  LT = 15;
  GT = 16;
  LE = 17;
  GE = 18;
  AND = 19;  // logical &&
  OR = 20;   // logical ||
}

message UnaryOp {
  UnaryOperator op = 1;
  Expr expr = 2;
}

enum UnaryOperator {
  UNARY_OPERATOR_UNSPECIFIED = 0;
  NEG = 1;      // unary -
  BIT_NOT = 2;  // ~
  NOT = 3;      // logical !
}

// Covers extern method calls, header methods (isValid, setValid, setInvalid),
// and packet methods (extract, emit, lookahead).
message MethodCall {
  Expr target = 1;
  string method = 2;
  repeated Expr args = 3;
  repeated Type type_args =
      4;  // for generic methods, e.g. packet.lookahead<T>()
}

// table.apply(): used as the subject of SwitchStmt, and as a boolean
// expression via the .hit / .miss fields.
message TableApplyExpr {
  string table_name = 1;  // references a TableBehavior and p4info table by name

  // Which aspect of the apply result is being read.
  // RESULT (default) is used as the subject of SwitchStmt (action_run).
  // HIT / MISS are used in boolean expressions (table.apply().hit / .miss).
  // RESULT = 0 is the proto default, so existing compiled .txtpb files that
  // omit this field continue to decode correctly.
  enum AccessKind {
    RESULT = 0;
    HIT = 1;
    MISS = 2;
  }
  AccessKind access_kind = 2;
}
