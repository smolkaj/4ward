// Dataplane gRPC service: packet injection and result observation.
//
// Implemented by DataplaneService (p4runtime/DataplaneService.kt).
// Serialized via a shared lock with P4RuntimeService to prevent races
// between control-plane writes and data-plane packet processing.

syntax = "proto3";

package fourward.dataplane;

import "p4/v1/p4runtime.proto";
import "simulator.proto";

option java_package = "fourward.dataplane";
option java_outer_classname = "DataplaneProto";

service Dataplane {
  // Inject a single packet into the data plane. Returns the result inline.
  rpc InjectPacket(InjectPacketRequest) returns (InjectPacketResponse);

  // Inject a batch of packets concurrently. Results are delivered via
  // SubscribeResults, not in the response.
  rpc InjectPackets(stream InjectPacketRequest) returns (InjectPacketsResponse);

  // Observe results from ALL injection sources (InjectPacket, InjectPackets,
  // PacketOut, other callers). Each result bundles the input with all its
  // outputs.
  rpc SubscribeResults(SubscribeResultsRequest)
      returns (stream SubscribeResultsResponse);

  // Registers a pre-packet hook. Before processing any dataplane RPC
  // (InjectPacket, InjectPackets, PacketOut), the server acquires the
  // write lock and sends a PrePacketHookInvocation. The client responds
  // with a PrePacketHookResponse containing P4Runtime updates to apply
  // atomically before packet processing.
  //
  // Only one hook can be registered at a time. The stream stays open for
  // the lifetime of the hook registration.
  rpc RegisterPrePacketHook(stream PrePacketHookResponse)
      returns (stream PrePacketHookInvocation);
}

message InjectPacketsResponse {}

message InputPacket {
  uint32 dataplane_ingress_port = 1;
  // Only populated when port translation is available.
  bytes p4rt_ingress_port = 3;
  bytes payload = 2;
}

message OutputPacket {
  uint32 dataplane_egress_port = 1;
  // Only populated when port translation is available.
  bytes p4rt_egress_port = 3;
  bytes payload = 2;
}

message InjectPacketRequest {
  oneof ingress_port {
    // Dataplane port number (e.g. 0, 1, 510).
    uint32 dataplane_ingress_port = 1;
    // P4Runtime port ID — opaque bytes whose encoding depends on
    // @p4runtime_translation. Requires a loaded pipeline with port
    // translation; otherwise the RPC fails with FAILED_PRECONDITION.
    bytes p4rt_ingress_port = 2;
  }
  bytes payload = 3;
}

// A set of output packets from one possible real execution.
// Programs with only parallel forks (clone, multicast) have exactly one
// possible outcome.  Programs with alternative forks (action selectors) have
// one possible outcome per alternative.
message PacketSet {
  repeated OutputPacket packets = 1;
}

// InjectPacket response. Omits the input (the caller already has it).
message InjectPacketResponse {
  fourward.sim.TraceTree trace = 1;
  // Each entry is one possible set of output packets from a single real
  // execution.  Programs with only parallel forks have exactly one entry.
  // Programs with alternative forks (action selectors) have one entry per
  // alternative — each representing a "possible world".
  repeated PacketSet possible_outcomes = 2;
}

// Result bundle for SubscribeResults: input + outputs + trace.
message ProcessPacketResult {
  InputPacket input_packet = 1;
  fourward.sim.TraceTree trace = 2;
  // Possible outcome sets (see InjectPacketResponse.possible_outcomes).
  repeated PacketSet possible_outcomes = 3;
}

message SubscribeResultsRequest {}

message SubscribeResultsResponse {
  oneof event {
    // Sent exactly once as the first message. Confirms the subscription is
    // registered and no results will be missed.
    SubscriptionActive active = 1;
    ProcessPacketResult result = 2;
  }
}

message SubscriptionActive {}

// Sent by the server before processing packets. The server holds the
// write lock and waits for the client's response before proceeding.
message PrePacketHookInvocation {}

// Sent by the client in response to a PrePacketHookInvocation. Contains
// P4Runtime updates to apply atomically before packet processing.
// An empty updates list means no changes needed.
message PrePacketHookResponse {
  repeated p4.v1.Update updates = 1;
}
